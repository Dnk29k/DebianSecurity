##############################################################################
#                                 CORNERS                                    #
##############################################################################
# Estilo "Isla": Bordes redondeados agresivos pero limpios
corner-radius = 15;
rounded-corners-exclude = [
    "class_g = 'Polybar'",     # Evita que la Polybar se recorte mal
    "class_g = 'Rofi'",        # Rofi ya gestiona sus propios bordes en su tema
    "window_type = 'tooltip'",
    "window_type = 'menu'",
    "window_type = 'dropdown_menu'",
    "window_type = 'popup_menu'"
];

round-borders = 1;
round-borders-exclude = [];

##############################################################################
#                                 SHADOWS                                    #
##############################################################################
# Sombras profundas para separar las ventanas flotantes y crear profundidad
shadow = true;
shadow-radius = 12;          # Sombra más amplia
shadow-opacity = 0.45;       # No muy oscura para mantener elegancia
shadow-offset-x = -12;
shadow-offset-y = -12;

shadow-exclude = [
    "class_g = 'Polybar'",     # Sombras dobles en Polybar quedan mal
    "class_g = 'Rofi'",        
    "class_g = 'firefox' && argb",
    "name = 'Notification'",
    "_GTK_FRAME_EXTENTS@:c",
    "window_type = 'menu'",
    "window_type = 'dropdown_menu'",
    "window_type = 'popup_menu'",
    "window_type = 'tooltip'"
];

##############################################################################
#                                  FADING                                    #
##############################################################################
# Transiciones suaves pero ultrarrápidas (sin lag visual)
#fading = true;
#fade-in-step = 0.04;         # Más rápido que el por defecto
#fade-out-step = 0.04;
#fade-delta = 8;              # Milisegundos entre frames

##############################################################################
#                                  OPACITY                                   #
##############################################################################
inactive-opacity = 0.95;     # Ventanas de fondo ligeramente transparentes
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

# Exclusiones para que ciertas ventanas NUNCA se pongan transparentes
focus-exclude = [
    "class_g = 'Cairo-clock'",
    "class_g = 'slop'"       # Para herramientas de recorte de pantalla
];

# Reglas personalizadas para tu entorno
opacity-rule = [
    "90:class_g = 'st-256color' && focused",   # Terminal activa (ajusta 'st' si usas Alacritty/Kitty)
    "75:class_g = 'st-256color' && !focused",  # Terminal inactiva
    "95:class_g = 'Rofi'",
    "100:class_g = 'Polybar'"
];

##############################################################################
#                                   BLUR                                     #
##############################################################################
# El efecto "cristal empañado" (requiere backend = "glx")
blur-method = "dual_kawase";
blur-strength = 2;           # Nivel 4 es el equilibrio perfecto rendimiento/estética
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS@:c"
];

##############################################################################
#                                  GENERAL                                   #
##############################################################################
# BACKEND: Obligamos a usar OpenGL para poder usar 'dual_kawase'
backend = "xrender";

# OPTIMIZACIÓN GLX PARA MÁQUINAS VIRTUALES
#glx-no-stencil = true;
glx-copy-from-front = false;
use-damage = true;           # Dibuja solo lo que cambia (Ahorra CPU a lo bestia)

# VSYNC: En MV, el vsync suele causar lag de teclado. Si ves "tearing", ponlo en 'true'
vsync = false;

# ELIMINADOR DE LÍNEAS NEGRAS (Crucial para bspwm)
unredir-if-possible = false; # Desactivado: Evita el parpadeo negro al cambiar de workspace

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.9; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 1.0; shadow = false; }
  dropdown_menu = { opacity = 1.0; shadow = false; }
};
